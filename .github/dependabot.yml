# =============================================================================
# Dependabot Configuration
# =============================================================================
# Keeps dependencies up to date by opening PRs for outdated packages.
# Covers npm (frontend), GitHub Actions, and pip (Conan in CI).
# =============================================================================

version: 2
updates:
  # ---------------------------------------------------------------------------
  # npm — Frontend dependencies
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    reviewers:
      - frontend-team
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "deps(frontend):"

  # ---------------------------------------------------------------------------
  # GitHub Actions — Workflow action versions
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    reviewers:
      - devops-team
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(actions):"

  # ---------------------------------------------------------------------------
  # pip — Python packages used in CI (Conan)
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    reviewers:
      - backend-team
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "deps(pip):"
