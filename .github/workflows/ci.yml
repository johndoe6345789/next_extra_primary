# =============================================================================
# CI Pipeline — Lint, Build, and Test
# =============================================================================
# Triggers on pushes to main and pull requests targeting main.
# The pipeline is split into six jobs with explicit dependencies:
#
#   lint-frontend ──► build-frontend ──► test-frontend
#   lint-backend  ──► build-backend  ──► test-backend
#
# Each job runs on ubuntu-latest and caches dependencies aggressively
# to keep iteration times short.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend Linting — ESLint + Prettier
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint . --max-warnings 0

      - name: Run Prettier check
        run: npx prettier --check .

  # ---------------------------------------------------------------------------
  # Backend Linting — clang-format + clang-tidy
  # ---------------------------------------------------------------------------
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: pip install clang-format==18.1.8

      - name: Check formatting with clang-format
        run: |
          find backend/src tools -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

  # ---------------------------------------------------------------------------
  # Frontend Build
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    needs: lint-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build Next.js application
        run: npm run build

      - name: Upload standalone build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-standalone
          path: frontend/.next/standalone
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Backend Build
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build Backend
    needs: lint-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Conan 2 and CMake
        run: |
          pip install conan
          conan profile detect --force

      - name: Install dependencies via Conan
        working-directory: backend
        run: conan install . --build=missing --output-folder=build

      - name: Configure CMake
        working-directory: backend
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build backend binary
        working-directory: backend
        run: cmake --build build -j$(nproc)

      - name: Upload backend binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-binary
          path: backend/build/nextra-api
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Frontend Tests
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test Frontend
    needs: build-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          if npm run test --if-present 2>/dev/null; then
            echo "Tests completed."
          else
            echo "::notice::No test script found — skipping."
          fi

  # ---------------------------------------------------------------------------
  # Backend Tests (GTest via CTest)
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test Backend
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Conan 2 and CMake
        run: |
          pip install conan
          conan profile detect --force

      - name: Install dependencies via Conan
        working-directory: backend
        run: conan install . --build=missing --output-folder=build

      - name: Configure CMake with testing enabled
        working-directory: backend
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON

      - name: Build with tests
        working-directory: backend
        run: cmake --build build -j$(nproc)

      - name: Run tests via CTest
        working-directory: backend
        run: ctest --test-dir build --output-on-failure
