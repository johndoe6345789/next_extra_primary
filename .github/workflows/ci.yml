# ============================================================
# CI Pipeline — Lint, Build, and Test
# ============================================================
# Triggers on pushes to main and pull requests targeting main.
#
#   lint-frontend ──► build-frontend ──► test-frontend
#   lint-backend  ──► build-backend  ──► test-backend
#
# Build jobs pull pre-baked dependency images from GHCR
# (built by base-images.yml) for fast dep installation.
# Falls back to from-scratch installs if images are missing.
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BE_DEPS: ghcr.io/${{ github.repository }}/backend-deps:latest
  FE_DEPS: ghcr.io/${{ github.repository }}/frontend-deps:latest

jobs:
  # ----------------------------------------------------------
  # Frontend Linting — ESLint + Prettier
  # ----------------------------------------------------------
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint . --max-warnings 0

      - name: Run Prettier check
        run: npx prettier --check .

  # ----------------------------------------------------------
  # Backend Linting — clang-format + clang-tidy
  # ----------------------------------------------------------
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: pip install clang-format==18.1.8

      - name: Check formatting with clang-format
        run: |
          find backend/src tools \
            -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

      - name: Pull backend deps image
        id: deps
        continue-on-error: true
        env:
          IMG: ${{ env.BE_DEPS }}
        run: docker pull "$IMG"

      - name: Run clang-tidy (advisory)
        if: steps.deps.outcome == 'success'
        continue-on-error: true
        env:
          IMG: ${{ env.BE_DEPS }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/src \
            -w /src/backend \
            "$IMG" \
            sh -c '
              conan install . --build=missing \
                -s build_type=Release \
                -s compiler.cppstd=20 \
                --output-folder=build &&
              cmake -B build \
                -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_EXPORT_COMPILE_COMMANDS=ON &&
              find src -name "*.cpp" \
                | xargs clang-tidy -p build
            '

      - name: Clang-tidy skipped (no base image)
        if: steps.deps.outcome != 'success'
        run: |
          echo "::notice::Backend deps image unavailable."
          echo "::notice::Run base-images workflow first."

  # ----------------------------------------------------------
  # Frontend Build
  # ----------------------------------------------------------
  build-frontend:
    name: Build Frontend
    needs: lint-frontend
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Pull frontend deps image
        id: pull-deps
        continue-on-error: true
        env:
          IMG: ${{ env.FE_DEPS }}
        run: docker pull "$IMG"

      - name: Extract cached node_modules
        if: steps.pull-deps.outcome == 'success'
        env:
          IMG: ${{ env.FE_DEPS }}
        run: |
          CID=$(docker create "$IMG")
          docker cp "$CID:/deps/node_modules" \
            ./node_modules
          docker rm "$CID"

      - name: Install dependencies
        run: npm install

      - name: Build Next.js application
        run: npm run build

      - name: Upload standalone build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-standalone
          path: frontend/.next/standalone
          retention-days: 7

  # ----------------------------------------------------------
  # Backend Build
  # ----------------------------------------------------------
  build-backend:
    name: Build Backend
    needs: lint-backend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull backend deps image
        id: pull-deps
        continue-on-error: true
        env:
          IMG: ${{ env.BE_DEPS }}
        run: docker pull "$IMG"

      - name: Extract Conan cache from base image
        if: steps.pull-deps.outcome == 'success'
        env:
          IMG: ${{ env.BE_DEPS }}
        run: |
          CID=$(docker create "$IMG")
          docker cp "$CID:/root/.conan2" \
            "$HOME/.conan2"
          docker rm "$CID"

      - name: Install build tools and Conan 2
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libpq-dev libssl-dev
          pip install conan
          conan profile detect --force

      - name: Install dependencies via Conan
        working-directory: backend
        run: >-
          conan install .
          --build=missing
          --output-folder=build

      - name: Configure CMake
        working-directory: backend
        run: >-
          cmake -B build
          -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake
          -DCMAKE_BUILD_TYPE=Release

      - name: Build backend binary
        working-directory: backend
        run: cmake --build build -j$(nproc)

      - name: Upload backend binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/build/nextra-api
          retention-days: 7

  # ----------------------------------------------------------
  # Frontend Tests
  # ----------------------------------------------------------
  test-frontend:
    name: Test Frontend
    needs: build-frontend
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Pull frontend deps image
        id: pull-deps
        continue-on-error: true
        env:
          IMG: ${{ env.FE_DEPS }}
        run: docker pull "$IMG"

      - name: Extract cached node_modules
        if: steps.pull-deps.outcome == 'success'
        env:
          IMG: ${{ env.FE_DEPS }}
        run: |
          CID=$(docker create "$IMG")
          docker cp "$CID:/deps/node_modules" \
            ./node_modules
          docker rm "$CID"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          if npm run test --if-present 2>/dev/null
          then
            echo "Tests completed."
          else
            echo "::notice::No test script — skipping."
          fi

  # ----------------------------------------------------------
  # Backend Tests (GTest via CTest)
  # ----------------------------------------------------------
  test-backend:
    name: Test Backend
    needs: build-backend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull backend deps image
        id: pull-deps
        continue-on-error: true
        env:
          IMG: ${{ env.BE_DEPS }}
        run: docker pull "$IMG"

      - name: Extract Conan cache from base image
        if: steps.pull-deps.outcome == 'success'
        env:
          IMG: ${{ env.BE_DEPS }}
        run: |
          CID=$(docker create "$IMG")
          docker cp "$CID:/root/.conan2" \
            "$HOME/.conan2"
          docker rm "$CID"

      - name: Install build tools and Conan 2
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libpq-dev libssl-dev
          pip install conan
          conan profile detect --force

      - name: Install dependencies via Conan
        working-directory: backend
        run: >-
          conan install .
          --build=missing
          --output-folder=build

      - name: Configure CMake with testing
        working-directory: backend
        run: >-
          cmake -B build
          -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON

      - name: Build with tests
        working-directory: backend
        run: cmake --build build -j$(nproc)

      - name: Run tests via CTest
        working-directory: backend
        run: >-
          ctest --test-dir build
          --output-on-failure
