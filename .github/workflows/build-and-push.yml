# =============================================================
# Build and push all service images to GHCR
# =============================================================
# Triggers on every push to main and on manual dispatch.
# Uses GHCR in prod mode and the local package repo in act mode.
#
# Published image pattern:
#   ghcr.io/<owner>/next_extra_primary/<service>:sha-<sha>
#   ghcr.io/<owner>/next_extra_primary/<service>:latest
# =============================================================

name: Build and push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      local_mode:
        description: Use local package repo registry mode
        type: boolean
        default: false
      local_registry:
        description: Local registry host for act runs
        type: string
        default: host.docker.internal:5050

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push all services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx for local registry
        if: ${{ env.ACT == 'true' || inputs.local_mode }}
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 6
            [registry."${{ inputs.local_registry }}"]
              http = true
              insecure = true

      - name: Set up Docker Buildx
        if: ${{ !(env.ACT == 'true' || inputs.local_mode) }}
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ !(env.ACT == 'true' || inputs.local_mode) }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to local registry
        if: ${{ env.ACT == 'true' || inputs.local_mode }}
        shell: bash
        env:
          LOCAL_REPO_PASSWORD: ${{ secrets.LOCAL_REPO_PASSWORD }}
        run: |
          printf '%s' "${LOCAL_REPO_PASSWORD:-admin}" | \
            docker login "${{ inputs.local_registry }}" \
              --username admin \
              --password-stdin

      - name: Build and push all images locally
        if: ${{ env.ACT == 'true' || inputs.local_mode }}
        uses: docker/bake-action@v5
        env:
          REGISTRY: ${{ inputs.local_registry }}/${{ github.event.repository.name }}
          TAG: sha-${{ steps.sha.outputs.short }}
        with:
          files: |
            docker-compose.yml
            docker-bake.hcl
          targets: default
          push: true

      # Bake reads docker-compose.yml for build contexts /
      # Dockerfiles and docker-bake.hcl for GHCR image tags.
      # REGISTRY and TAG are injected as env vars, picked up
      # by the HCL variable blocks.  GHA cache is applied to
      # every target via the `set` wildcard.
      - name: Build and push all images
        if: ${{ !(env.ACT == 'true' || inputs.local_mode) }}
        uses: docker/bake-action@v5
        env:
          REGISTRY: >-
            ghcr.io/${{ github.repository_owner }}/next_extra_primary
          TAG: sha-${{ steps.sha.outputs.short }}
        with:
          files: |
            docker-compose.yml
            docker-bake.hcl
          targets: default
          push: true
          provenance: false
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
