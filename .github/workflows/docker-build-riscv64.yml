# ============================================================
# Docker Build — linux/riscv64
# Builds frontend and backend for riscv64 via QEMU.
# Frontend uses Webpack (Turbopack has no riscv64 support).
# ============================================================
name: Docker Build linux/riscv64

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  build-frontend:
    name: Build frontend linux/riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          build-contexts: |
            manager=./tools/manager
          platforms: linux/riscv64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/frontend:build-${{ github.sha }}-riscv64
          cache-from: type=gha,scope=frontend-riscv64
          cache-to: type=gha,mode=max,scope=frontend-riscv64

  build-backend:
    name: Build backend linux/riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          build-contexts: |
            manager=./tools/manager
          platforms: linux/riscv64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/backend:build-${{ github.sha }}-riscv64
          cache-from: type=gha,scope=backend-riscv64
          cache-to: type=gha,mode=max,scope=backend-riscv64
