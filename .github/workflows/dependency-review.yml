# =============================================================================
# Dependency Review
# =============================================================================
# Scans pull requests for newly introduced dependencies that have known
# vulnerabilities. Blocks PRs that add critical or high severity CVEs.
# =============================================================================

name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high and critical severity vulnerabilities
          fail-on-severity: high
          # Deny specific problematic licenses (optional, adjust as needed)
          deny-licenses: GPL-3.0, AGPL-3.0
