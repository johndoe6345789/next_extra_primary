# ============================================================
# Docker Build — linux/amd64
# Builds frontend and backend for amd64 (native runner,
# no QEMU needed). Pushes intermediate tags consumed by
# docker-merge.yml to assemble the multi-arch manifest.
# ============================================================
name: Docker Build linux/amd64

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/frontend:build-${{ github.sha }}-amd64
          cache-from: type=gha,scope=frontend-amd64
          cache-to: type=gha,mode=max,scope=frontend-amd64

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/backend:build-${{ github.sha }}-amd64
          cache-from: type=gha,scope=backend-amd64
          cache-to: type=gha,mode=max,scope=backend-amd64
