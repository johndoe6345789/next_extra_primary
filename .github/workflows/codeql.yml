# =============================================================================
# CodeQL Security Scanning
# =============================================================================
# Runs GitHub CodeQL analysis for both JS/TS and C++.
# C++ analysis uses GHCR base image for cached Conan deps.
# =============================================================================

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan: Monday at 06:15 UTC
    - cron: "15 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL Analysis — JavaScript/TypeScript
  # ---------------------------------------------------------------------------
  analyze-javascript:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ---------------------------------------------------------------------------
  # CodeQL Analysis — C++ (weekly schedule only)
  # ---------------------------------------------------------------------------
  analyze-cpp:
    name: Analyze C++
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BE_DEPS: >-
        ghcr.io/${{ github.repository }}/backend-deps:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull backend deps image
        id: pull-deps
        continue-on-error: true
        env:
          IMG: ${{ env.BE_DEPS }}
        run: docker pull "$IMG"

      - name: Extract Conan cache
        if: steps.pull-deps.outcome == 'success'
        env:
          IMG: ${{ env.BE_DEPS }}
        run: |
          CID=$(docker create "$IMG")
          docker cp "$CID:/root/.conan2" \
            "$HOME/.conan2"
          docker rm "$CID"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libpq-dev libssl-dev
          pip install conan
          conan profile detect --force

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-extended

      - name: Build backend for analysis
        working-directory: backend
        run: |
          conan install . --build=missing
          cmake --preset conan-release
          cmake --build --preset conan-release -j$(nproc)

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"
