# ============================================================
# Docker Merge — Assemble multi-arch manifest
# Triggers when any per-arch build completes. Checks that
# all 4 arches succeeded for the same commit, then merges
# the per-arch images into a single multi-arch manifest.
# ============================================================
name: Docker Merge Manifests

on:
  workflow_run:
    workflows:
      - "Docker Build linux/amd64"
      - "Docker Build linux/arm64"
      - "Docker Build linux/riscv64"
      - "Docker Build linux/ppc64le"
    types: [completed]

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  merge:
    name: Merge Manifests
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      REPO: ${{ github.repository }}
    steps:
      - name: Check all arch builds succeeded
        id: check
        run: |
          for arch in amd64 arm64 riscv64 ppc64le; do
            wf="docker-build-${arch}.yml"
            result=$(gh run list \
              --repo "$REPO" \
              --workflow "$wf" \
              --commit "$HEAD_SHA" \
              --json conclusion \
              --jq '.[0].conclusion // "pending"')
            if [ "$result" != "success" ]; then
              echo "$arch not ready yet ($result) — skipping"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.check.outputs.ready == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.ready == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Compute final image tags
        if: steps.check.outputs.ready == 'true'
        id: tags
        run: |
          SHORT="${HEAD_SHA:0:7}"
          FE="ghcr.io/${REPO}/frontend"
          BE="ghcr.io/${REPO}/backend"
          if [[ "$HEAD_BRANCH" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            V="$HEAD_BRANCH"
            MM="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            M="${BASH_REMATCH[1]}"
            FE_T="-t ${FE}:${V} -t ${FE}:${MM} -t ${FE}:${M} -t ${FE}:latest"
            BE_T="-t ${BE}:${V} -t ${BE}:${MM} -t ${BE}:${M} -t ${BE}:latest"
          else
            FE_T="-t ${FE}:${HEAD_BRANCH} -t ${FE}:sha-${SHORT}"
            BE_T="-t ${BE}:${HEAD_BRANCH} -t ${BE}:sha-${SHORT}"
          fi
          echo "fe_tags=${FE_T}" >> "$GITHUB_OUTPUT"
          echo "be_tags=${BE_T}" >> "$GITHUB_OUTPUT"

      - name: Create frontend multi-arch manifest
        if: steps.check.outputs.ready == 'true'
        env:
          FE_TAGS: ${{ steps.tags.outputs.fe_tags }}
        run: |
          FE="ghcr.io/${REPO}/frontend"
          docker buildx imagetools create $FE_TAGS \
            "${FE}:build-${HEAD_SHA}-amd64" \
            "${FE}:build-${HEAD_SHA}-arm64" \
            "${FE}:build-${HEAD_SHA}-riscv64" \
            "${FE}:build-${HEAD_SHA}-ppc64le"

      - name: Create backend multi-arch manifest
        if: steps.check.outputs.ready == 'true'
        env:
          BE_TAGS: ${{ steps.tags.outputs.be_tags }}
        run: |
          BE="ghcr.io/${REPO}/backend"
          docker buildx imagetools create $BE_TAGS \
            "${BE}:build-${HEAD_SHA}-amd64" \
            "${BE}:build-${HEAD_SHA}-arm64" \
            "${BE}:build-${HEAD_SHA}-riscv64" \
            "${BE}:build-${HEAD_SHA}-ppc64le"
