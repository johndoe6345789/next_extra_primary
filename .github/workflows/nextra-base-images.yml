# =============================================================
# Nextra base images — pre-baked apt + conan + npm layers.
# Publishes to host.docker.internal:5050 under act, to GHCR
# when run from GitHub. Rebuild triggers: conanfile.py edit,
# package.json edit, base-image Dockerfile edit, or weekly.
# =============================================================
name: Nextra base images

on:
  push:
    branches: [main]
    paths:
      - ".local/docker/nextra-base-*.Dockerfile"
      - "services/drogon-host/conanfile.py"
      - "package.json"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      local_mode:
        description: Use local package repo registry
        type: boolean
        default: false
      local_registry:
        description: Local registry host
        type: string
        default: host.docker.internal:5050

permissions:
  contents: read
  packages: write

jobs:
  base-images:
    name: Build and push base images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (local)
        if: ${{ env.ACT == 'true' || inputs.local_mode }}
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
            [registry."${{ inputs.local_registry }}"]
              http = true
              insecure = true

      - name: Set up Docker Buildx (ghcr)
        if: ${{ !(env.ACT == 'true' || inputs.local_mode) }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to local registry
        if: ${{ env.ACT == 'true' || inputs.local_mode }}
        shell: bash
        env:
          LOCAL_REPO_PASSWORD: ${{ secrets.LOCAL_REPO_PASSWORD }}
          LOCAL_REG: ${{ inputs.local_registry }}
        run: |
          printf '%s' "${LOCAL_REPO_PASSWORD:-admin}" | \
            docker login "$LOCAL_REG" \
              --username admin --password-stdin

      - name: Log in to GHCR
        if: ${{ !(env.ACT == 'true' || inputs.local_mode) }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute registry prefix
        id: reg
        shell: bash
        env:
          LOCAL_MODE_INPUT: ${{ inputs.local_mode }}
          LOCAL_REG: ${{ inputs.local_registry }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ "${ACT:-false}" = "true" ] || \
             [ "$LOCAL_MODE_INPUT" = "true" ]; then
            echo "prefix=$LOCAL_REG/next_extra_primary" \
              >> "$GITHUB_OUTPUT"
          else
            echo "prefix=ghcr.io/$OWNER/next_extra_primary" \
              >> "$GITHUB_OUTPUT"
          fi

      - name: Build nextra-base-apt
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .local/docker/nextra-base-apt.Dockerfile
          push: true
          tags: |
            ${{ steps.reg.outputs.prefix }}/nextra-base-apt:latest

      - name: Build nextra-base-conan
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .local/docker/nextra-base-conan.Dockerfile
          push: true
          build-args: |
            APT_IMAGE=${{ steps.reg.outputs.prefix }}/nextra-base-apt:latest
          tags: |
            ${{ steps.reg.outputs.prefix }}/nextra-base-conan:latest

      - name: Build nextra-base-node
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .local/docker/nextra-base-node.Dockerfile
          push: true
          tags: |
            ${{ steps.reg.outputs.prefix }}/nextra-base-node:latest
