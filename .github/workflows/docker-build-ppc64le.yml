# ============================================================
# Docker Build — linux/ppc64le
# Builds frontend and backend for ppc64le via QEMU.
# Node 22 compiles from source (n --build). Slow first
# build; subsequent builds use GHA layer cache.
# Pushes intermediate tags consumed by docker-merge.yml.
# ============================================================
name: Docker Build linux/ppc64le

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build linux/ppc64le
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/ppc64le
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/frontend:build-${{ github.sha }}-ppc64le
          cache-from: type=gha,scope=frontend-ppc64le
          cache-to: type=gha,mode=max,scope=frontend-ppc64le

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/ppc64le
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/backend:build-${{ github.sha }}-ppc64le
          cache-from: type=gha,scope=backend-ppc64le
          cache-to: type=gha,mode=max,scope=backend-ppc64le
