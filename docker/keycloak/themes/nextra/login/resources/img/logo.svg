<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="280" height="56" viewBox="0 0 280 56">
  <defs>
    <linearGradient id="dGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="dGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Diamond mark — echoes the navbar brand -->
  <g filter="url(#dGlow)">
    <polygon points="28,8 44,28 28,48 12,28"
             fill="url(#dGrad)"/>
    <polygon points="28,16 38,28 28,40 18,28"
             fill="#0c0a14" opacity="0.4"/>
  </g>

  <!-- Wordmark — sized for legibility against the
       page's purple radial gradient backdrop -->
  <text x="60" y="36"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="26" font-weight="800"
        fill="#ffffff" letter-spacing="-0.02em">
    Next
  </text>
  <text x="135" y="36"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="26" font-weight="600" font-style="italic"
        fill="#c4b5fd" letter-spacing="-0.02em">
    Extra
  </text>
</svg>
