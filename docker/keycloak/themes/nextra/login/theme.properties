## Nextra branded login theme.
## Extends Keycloak's stock 'keycloak' theme so we
## inherit all the FreeMarker templates and only have
## to override the CSS + a few colours.

parent=keycloak
import=common/keycloak

styles=css/login.css css/nextra.css

## Locale list shown in the login footer dropdown.
## Mirrors frontend/src/i18n/config.ts (en, es, fr, de,
## ja, zh, nl, cy).
locales=en,es,fr,de,ja,zh,nl,cy
