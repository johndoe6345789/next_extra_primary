resolver 127.0.0.11 valid=2s ipv6=off;

proxy_connect_timeout 2s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # ----------------------------------------------------------
    # SSO: internal validation sub-request
    # ----------------------------------------------------------
    location = /_sso_validate {
        internal;
        set $backend http://nextra-auth:9001;
        proxy_pass $backend/api/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location @sso_login {
        return 302 /sso/realms/nextra/protocol/openid-connect/auth?client_id=nextra-app&response_type=code&scope=openid%20profile%20email&redirect_uri=$scheme%3A%2F%2F$host%2Fapp%2Fen%2Fauth%2Fcallback&state=$request_uri;
    }

    # Dev: Next.js error symbolication + font requests.
    # Next.js emits font URLs without the basePath so
    # they arrive at the root; proxy them to the frontend.
    location /__nextjs_original-stack-frames {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_set_header Host $host;
    }
    location /__nextjs_font/ {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # Portal homepage (Drogon)
    # ----------------------------------------------------------
    location = / {
        set $backend http://nextra-platform:9012;
        proxy_pass $backend/portal/;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter 'href="//"' 'href="/"';
        sub_filter_once on;
    }
    location /portal {
        set $backend http://nextra-platform:9012;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # Main app (Next.js frontend)
    # ----------------------------------------------------------
    location = /app {
        return 302 /app/en;
    }
    location /app {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # Keycloak (browser-facing)
    # ----------------------------------------------------------
    location /sso/ {
        set $kc http://keycloak:8080;
        proxy_pass $kc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 8889;
    }

    # ----------------------------------------------------------
    # SSO portal (login gate Next.js app)
    # ----------------------------------------------------------
    location /sso-portal {
        set $ssoportal http://sso:3000;
        proxy_pass $ssoportal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # Swagger docs
    # ----------------------------------------------------------
    location /apidocs/ {
        alias /usr/share/nginx/portal/;
        try_files swagger.html =404;
    }

    # ----------------------------------------------------------
    # Package repository UI (Next.js, basePath=/repo)
    # ----------------------------------------------------------
    location /repo {
        set $pkgrepo http://packagerepo-frontend:3000;
        proxy_pass $pkgrepo;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # OCI / Docker registry v2 (direct to pkgrepo backend)
    location /v2 {
        set $pkgrepo http://packagerepo-backend:5000;
        proxy_pass $pkgrepo;
        proxy_set_header Host $host;
        proxy_set_header Authorization
            $http_authorization;
        client_max_body_size 2g;
        # Large layer uploads (e.g. 500 MB debian base) can take minutes;
        # override the 30 s global default so nginx doesn't drop the connection.
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }

    # ----------------------------------------------------------
    # S3 storage UI (Next.js, basePath=/s3)
    # ----------------------------------------------------------
    location /s3 {
        set $s3fe http://s3-frontend:3000;
        proxy_pass $s3fe;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # S3 API direct (used by frontend rewrites)
    location /api/s3/ {
        set $s3be http://s3:9000;
        proxy_pass $s3be;
        proxy_set_header Host $host;
        proxy_set_header Authorization
            $http_authorization;
        client_max_body_size 2g;
    }

    # ----------------------------------------------------------
    # DB Admin UI (Next.js, basePath=/db)
    # ----------------------------------------------------------
    location /db {
        set $dbfe http://pgadmin-frontend:3000;
        proxy_pass $dbfe;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/pgadmin/ {
        set $dbbe http://pgadmin-backend:5060;
        proxy_pass $dbbe;
        proxy_set_header Host $host;
        proxy_set_header Authorization
            $http_authorization;
    }

    # ----------------------------------------------------------
    # Webmail UI (Next.js, basePath=/emailclient)
    # ----------------------------------------------------------
    location /emailclient {
        set $emailfe http://emailclient:3000;
        proxy_pass $emailfe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/email/ {
        set $emailapi http://emailclient-api:5000;
        proxy_pass $emailapi;
        proxy_set_header Host $host;
        proxy_set_header Authorization
            $http_authorization;
    }

    # ----------------------------------------------------------
    # Alerts centre UI (Next.js, basePath=/alerts)
    # ----------------------------------------------------------
    location /alerts {
        set $alertsfe http://alerts:3000;
        proxy_pass $alertsfe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # API — all routes handled by the Drogon monolith.
    # Search uses /api/search/ → backend → Elasticsearch.
    # ----------------------------------------------------------
    location /api/ {
        set $backend http://nextra-platform:9012;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header Authorization
            $http_authorization;
    }
}
