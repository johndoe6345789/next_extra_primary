server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # Portal homepage
    location = / {
        rewrite ^ /portal/index.html last;
    }
    location /portal/ {
        alias /usr/share/nginx/portal/;
    }

    # Main frontend (basePath: /app)
    location /app {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Backend API (direct access)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
    }

    # Package Repo frontend (basePath: /repo)
    location /repo {
        proxy_pass http://packagerepo-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # S3 Browser frontend (basePath: /s3)
    location /s3 {
        proxy_pass http://s3-frontend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # PgAdmin frontend (basePath: /db)
    location /db {
        proxy_pass http://pgadmin-frontend:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Roundcube webmail
    location /mail/ {
        proxy_pass http://roundcube:80/;
        proxy_set_header Host $host;
    }

    # Tool backend APIs (direct access)
    location /s3-api/ {
        proxy_pass http://s3:9000/;
        proxy_set_header Host $host;
    }
    location /repo-api/ {
        proxy_pass http://packagerepo-backend:5000/;
        proxy_set_header Host $host;
    }
    location /db-api/ {
        proxy_pass http://pgadmin-backend:5060/;
        proxy_set_header Host $host;
    }
}
