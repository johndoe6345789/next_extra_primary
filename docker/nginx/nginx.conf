resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # Portal homepage
    location = / {
        rewrite ^ /portal/index.html last;
    }
    location /portal/ {
        alias /usr/share/nginx/portal/;
    }

    # Redirect bare /app to default locale
    location = /app {
        return 302 /app/en;
    }

    # Main frontend (basePath: /app)
    location /app {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Swagger UI (backend redirects /api/docs here)
    location /apidocs/ {
        alias /usr/share/nginx/portal/;
        try_files swagger.html =404;
    }

    # PgAdmin frontend API — bypass build-time rewrite
    # next.config: /api/pgadmin/:path* → backend/api/:path*
    location /api/pgadmin/ {
        set $dbapi http://pgadmin-backend:5060;
        rewrite ^/api/pgadmin/(.*)$ /api/$1 break;
        proxy_pass $dbapi;
        proxy_set_header Host $host;
    }

    # Backend API (direct access)
    location /api/ {
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # Package Repo frontend (basePath: /repo)
    location /repo {
        set $repofe http://packagerepo-frontend:3000;
        proxy_pass $repofe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # S3 Browser frontend (basePath: /s3)
    location /s3 {
        set $s3fe http://s3-frontend:3001;
        proxy_pass $s3fe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # PgAdmin frontend (basePath: /db)
    location /db {
        set $dbfe http://pgadmin-frontend:3002;
        proxy_pass $dbfe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Email client (basePath: /emailclient)
    location /emailclient {
        set $emailfe http://emailclient:3000;
        proxy_pass $emailfe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Email client API
    location /mail-api/ {
        set $emailapi http://emailclient-api:5000;
        proxy_pass $emailapi;
        proxy_set_header Host $host;
    }

    # Package repo API — proxy directly to backend
    # (Next.js rewrites are build-time only; bypass them)
    location /v1/ {
        set $repoapi http://packagerepo-backend:5000;
        proxy_pass $repoapi;
        proxy_set_header Host $host;
    }
    location /auth/ {
        set $repoapi http://packagerepo-backend:5000;
        proxy_pass $repoapi;
        proxy_set_header Host $host;
    }
    location /admin/ {
        set $repoapi http://packagerepo-backend:5000;
        proxy_pass $repoapi;
        proxy_set_header Host $host;
    }

    # S3 server API — mirror Next.js build-time rewrites
    location = /api/s3/health {
        set $s3api http://s3:9000;
        rewrite ^ /health break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location = /api/s3/buckets {
        set $s3api http://s3:9000;
        rewrite ^ / break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location ~ ^/api/s3/buckets/(.+)$ {
        set $s3api http://s3:9000;
        rewrite ^/api/s3/buckets/(.+)$ /$1 break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location ~ ^/api/s3/list/(.+)$ {
        set $s3api http://s3:9000;
        rewrite ^/api/s3/list/(.+)$ /list/$1 break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location ~ ^/api/s3/objects/(.+)$ {
        set $s3api http://s3:9000;
        rewrite ^/api/s3/objects/(.+)$ /$1 break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }

    # PgAdmin API — proxy directly to pgadmin backend
    location /api/db/ {
        set $dbapi http://pgadmin-backend:5060;
        rewrite ^/api/db/(.*)$ /$1 break;
        proxy_pass $dbapi;
        proxy_set_header Host $host;
    }

    # Tool backend APIs (direct access)
    location /s3-api/ {
        set $s3api http://s3:9000;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location /repo-api/ {
        set $repoapi http://packagerepo-backend:5000;
        proxy_pass $repoapi;
        proxy_set_header Host $host;
    }
    location /db-api/ {
        set $dbapi http://pgadmin-backend:5060;
        proxy_pass $dbapi;
        proxy_set_header Host $host;
    }
}
