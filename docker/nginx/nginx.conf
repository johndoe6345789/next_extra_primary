        set $searchfe http://search:3000;
        proxy_pass $searchfe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-User-Id $sso_user;
    }

    # ----------------------------------------------------------
    # Tool: Wiki (SSO gated)
    # ----------------------------------------------------------
    location /wiki {
    # Tool: Social admin (SSO gated) — Phase 7
    # ----------------------------------------------------------
    location /social-admin {
        auth_request /_sso_validate;
        error_page 401 = @sso_login;
        auth_request_set $sso_user
            $upstream_http_x_user_id;
        set $wikife http://wiki:3000;
