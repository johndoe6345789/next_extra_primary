resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # ----------------------------------------------------------
    # SSO: internal validation sub-request
    # Returns 200 (valid nextra_sso cookie) or 401 (not authed)
    # ----------------------------------------------------------
    location = /_sso_validate {
        internal;
        set $backend http://backend:8080;
        proxy_pass $backend/api/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # Named location: redirect unauthenticated tool requests
    # to the SSO login page, preserving the original URL.
    location @sso_login {
        return 302 /sso/login?next=$request_uri;
    }

    # ----------------------------------------------------------
    # Portal homepage
    # ----------------------------------------------------------
    location = / {
        rewrite ^ /portal/index.html last;
    }
    location /portal/ {
        alias /usr/share/nginx/portal/;
    }

    # ----------------------------------------------------------
    # Main app (SSO gated — tokens written to localStorage
    # by the SSO form so the app auto-authenticates)
    # ----------------------------------------------------------
    location = /app {
        return 302 /app/en;
    }
    location /app {
        auth_request /_sso_validate;
        error_page 401 = @sso_login;
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # SSO portal (login / logout)
    # ----------------------------------------------------------
    location /sso {
        set $sso http://sso:3000;
        proxy_pass $sso;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # Backend API (no SSO gate — APIs use Bearer tokens)
    # ----------------------------------------------------------
    location /apidocs/ {
        alias /usr/share/nginx/portal/;
        try_files swagger.html =404;
    }
    location /api/pgadmin/ {
        set $dbapi http://pgadmin-backend:5060;
        rewrite ^/api/pgadmin/(.*)$ /api/$1 break;
        proxy_pass $dbapi;
        proxy_set_header Host $host;
    }
    location /api/ {
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # Tool: Package Repo (SSO gated)
    # ----------------------------------------------------------
    location /repo {
        auth_request /_sso_validate;
        error_page 401 = @sso_login;
        auth_request_set $sso_user
            $upstream_http_x_user_id;
        set $repofe http://packagerepo-frontend:3000;
        proxy_pass $repofe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-User-Id $sso_user;
    }

    # ----------------------------------------------------------
    # Tool: S3 Browser (SSO gated)
    # ----------------------------------------------------------
    location /s3 {
        auth_request /_sso_validate;
        error_page 401 = @sso_login;
        auth_request_set $sso_user
            $upstream_http_x_user_id;
        set $s3fe http://s3-frontend:3001;
        proxy_pass $s3fe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-User-Id $sso_user;
    }

    # ----------------------------------------------------------
    # Tool: PgAdmin (SSO gated)
    # ----------------------------------------------------------
    location /db {
        auth_request /_sso_validate;
        error_page 401 = @sso_login;
        auth_request_set $sso_user
            $upstream_http_x_user_id;
        set $dbfe http://pgadmin-frontend:3002;
        proxy_pass $dbfe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-User-Id $sso_user;
    }

    # ----------------------------------------------------------
    # Tool: Email client (SSO gated)
    # ----------------------------------------------------------
    location /emailclient {
