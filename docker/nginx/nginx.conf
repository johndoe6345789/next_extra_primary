        proxy_set_header Host $host;
        proxy_set_header X-User-Id $sso_user;
    }

    # ----------------------------------------------------------
    # Tool: Audit centre (SSO gated)
    # ----------------------------------------------------------
    location /audit {
    # Tool: Analytics dashboard (SSO gated, admin)
    # ----------------------------------------------------------
    location /analytics {
        auth_request /_sso_validate;
        error_page 401 = @sso_login;
        auth_request_set $sso_user
            $upstream_http_x_user_id;
        set $auditfe http://audit:3000;
        proxy_pass $auditfe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-User-Id $sso_user;
    }

    # ----------------------------------------------------------
    # Tool: Search indexer dashboard (SSO gated)
    # ----------------------------------------------------------
    location /search {
        auth_request /_sso_validate;
        error_page 401 = @sso_login;
        auth_request_set $sso_user
