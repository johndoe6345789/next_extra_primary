    }

    # Email client API (no SSO gate — internal)
    # Strip /mail-api prefix before forwarding so
    # Flask sees /api/... not /mail-api/api/...
    location /mail-api/ {
        set $emailapi http://emailclient-api:5000;
        rewrite ^/mail-api/(.*)$ /$1 break;
        proxy_pass $emailapi;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # Tool backend APIs (no SSO gate — use own auth)
    # ----------------------------------------------------------
    location /v1/ {
        set $repoapi http://packagerepo-backend:5000;
        proxy_pass $repoapi;
        proxy_set_header Host $host;
    }
    location /auth/ {
        set $repoapi http://packagerepo-backend:5000;
        proxy_pass $repoapi;
        proxy_set_header Host $host;
    }
    location /admin/ {
        set $repoapi http://packagerepo-backend:5000;
        proxy_pass $repoapi;
        proxy_set_header Host $host;
    }

    location = /api/s3/health {
        set $s3api http://s3:9000;
        rewrite ^ /health break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location = /api/s3/buckets {
        set $s3api http://s3:9000;
        rewrite ^ / break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location ~ ^/api/s3/buckets/(.+)$ {
        set $s3api http://s3:9000;
        rewrite ^/api/s3/buckets/(.+)$ /$1 break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location ~ ^/api/s3/list/(.+)$ {
        set $s3api http://s3:9000;
        rewrite ^/api/s3/list/(.+)$ /list/$1 break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location ~ ^/api/s3/objects/(.+)$ {
        set $s3api http://s3:9000;
        rewrite ^/api/s3/objects/(.+)$ /$1 break;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location /api/db/ {
        set $dbapi http://pgadmin-backend:5060;
        rewrite ^/api/db/(.*)$ /$1 break;
        proxy_pass $dbapi;
        proxy_set_header Host $host;
    }
    location /s3-api/ {
        set $s3api http://s3:9000;
        proxy_pass $s3api;
        proxy_set_header Host $host;
    }
    location /repo-api/ {
        set $repoapi http://packagerepo-backend:5000;
        proxy_pass $repoapi;
        proxy_set_header Host $host;
    }
    location /db-api/ {
        set $dbapi http://pgadmin-backend:5060;
        proxy_pass $dbapi;
        proxy_set_header Host $host;
    }
}
