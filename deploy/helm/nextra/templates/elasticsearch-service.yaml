{{- if .Values.elasticsearch.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nextra.fullname" . }}-elasticsearch
  labels:
    {{- include "nextra.labels" . | nindent 4 }}
    app.kubernetes.io/component: elasticsearch
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.elasticsearch.port }}
      targetPort: http
  selector:
    {{- include "nextra.selectorLabels" (dict "ctx" . "component" "elasticsearch") | nindent 4 }}
{{- end -}}
