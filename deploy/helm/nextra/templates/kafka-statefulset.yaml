{{- if .Values.kafka.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nextra.fullname" . }}-kafka
  labels:
    {{- include "nextra.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  serviceName: {{ include "nextra.fullname" . }}-kafka
  replicas: 1
  selector:
    matchLabels:
      {{- include "nextra.selectorLabels" (dict "ctx" . "component" "kafka") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nextra.selectorLabels" (dict "ctx" . "component" "kafka") | nindent 8 }}
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          ports:
            - name: kafka
              containerPort: {{ .Values.kafka.port }}
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "0"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "controller,broker"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "0@localhost:9093"
          volumeMounts:
            - name: data
              mountPath: /bitnami/kafka
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.kafka.storage }}
{{- end -}}
