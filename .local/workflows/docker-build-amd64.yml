# ============================================================
# Docker Build — linux/amd64 (Package Repository)
# Native runner, no QEMU. Pushes intermediate tags consumed
# by docker-merge.yml to assemble multi-arch manifest.
# ============================================================
name: Docker Build linux/amd64

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "tools/packagerepo/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo/frontend
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/packagerepo-frontend:build-${{ github.sha }}-amd64
          cache-from: type=gha,scope=pkgrepo-fe-amd64
          cache-to: type=gha,mode=max,scope=pkgrepo-fe-amd64

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo
          file: ./tools/packagerepo/backend/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/packagerepo-backend:build-${{ github.sha }}-amd64
          cache-from: type=gha,scope=pkgrepo-be-amd64
          cache-to: type=gha,mode=max,scope=pkgrepo-be-amd64
