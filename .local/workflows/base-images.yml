# =============================================================
# Base Images — Package Repository
# Pre-bakes Drogon (backend) and npm deps (frontend) for
# all 4 architectures. Subsequent per-arch builds can use
# these as cache layers for fast compilation.
#
# Triggers on dependency file changes, weekly, or manually.
# =============================================================
name: Base Images

on:
  push:
    branches: [main]
    paths:
      - "tools/packagerepo/backend/Dockerfile"
      - "tools/packagerepo/backend/CMakeLists.txt"
      - "tools/packagerepo/frontend/package.json"
      - "tools/packagerepo/frontend/package-lock.json"
      - ".local/docker/packagerepo-*.Dockerfile"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------
  # Backend deps: Ubuntu + Drogon v1.9.3 pre-compiled
  # ---------------------------------------------------------
  backend-deps:
    name: Backend Deps Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for multi-platform
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute dep file hash
        id: hash
        run: |
          H=$(sha256sum \
            .local/docker/packagerepo-backend-deps.Dockerfile \
            | cut -c1-12)
          echo "short=$H" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}/packagerepo-backend-deps
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.hash.outputs.short }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          file: .local/docker/packagerepo-backend-deps.Dockerfile
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: >-
            linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le
          cache-from: type=gha,scope=pkgrepo-be-deps
          cache-to: >-
            type=gha,mode=max,scope=pkgrepo-be-deps

  # ---------------------------------------------------------
  # Frontend deps: Node 22 + npm install
  # ---------------------------------------------------------
  frontend-deps:
    name: Frontend Deps Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for multi-platform
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute dep file hash
        id: hash
        run: |
          H=$(sha256sum \
            tools/packagerepo/frontend/package.json \
            | cut -c1-12)
          echo "short=$H" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}/packagerepo-frontend-deps
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.hash.outputs.short }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          file: .local/docker/packagerepo-frontend-deps.Dockerfile
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: >-
            linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le
          cache-from: type=gha,scope=pkgrepo-fe-deps
          cache-to: >-
            type=gha,mode=max,scope=pkgrepo-fe-deps
