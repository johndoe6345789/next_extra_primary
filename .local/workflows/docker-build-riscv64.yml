# ============================================================
# Docker Build — linux/riscv64 (Package Repository)
# Builds via QEMU. Frontend uses Webpack (no Turbopack
# support on riscv64).
# ============================================================
name: Docker Build linux/riscv64

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "tools/packagerepo/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-frontend:
    name: Build frontend linux/riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo/frontend
          file: ./tools/packagerepo/frontend/Dockerfile.riscv64
          platforms: linux/riscv64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/packagerepo-frontend:build-${{ github.sha }}-riscv64
          cache-from: type=gha,scope=pkgrepo-fe-riscv64
          cache-to: type=gha,mode=max,scope=pkgrepo-fe-riscv64

  build-backend:
    name: Build backend linux/riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo
          file: ./tools/packagerepo/backend/Dockerfile
          platforms: linux/riscv64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/packagerepo-backend:build-${{ github.sha }}-riscv64
          cache-from: type=gha,scope=pkgrepo-be-riscv64
          cache-to: type=gha,mode=max,scope=pkgrepo-be-riscv64
