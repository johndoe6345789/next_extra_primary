# ============================================================
# CI Pipeline — Package Repository (goodpackagerepo)
# ============================================================
# Local CI for the self-hosted package repository.
# Run with: act -W .local/workflows/ci.yml
#
#   lint-frontend ──► build-frontend ──► test-frontend
#   build-backend (Docker-based, Drogon from source)
# ============================================================

name: CI — Package Repository

on:
  push:
    branches: [main]
    paths:
      - "tools/packagerepo/**"
  pull_request:
    branches: [main]
    paths:
      - "tools/packagerepo/**"
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------
  # Frontend Linting — ESLint + Prettier
  # ----------------------------------------------------------
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/packagerepo/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint . --max-warnings 0
        continue-on-error: true

      - name: Run Prettier check
        run: npx prettier --check .
        continue-on-error: true

  # ----------------------------------------------------------
  # Frontend Build
  # ----------------------------------------------------------
  build-frontend:
    name: Build Frontend
    needs: lint-frontend
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/packagerepo/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Next.js application
        run: npm run build

  # ----------------------------------------------------------
  # Frontend Tests
  # ----------------------------------------------------------
  test-frontend:
    name: Test Frontend
    needs: build-frontend
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/packagerepo/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          if npm run test --if-present 2>/dev/null
          then
            echo "Tests completed."
          else
            echo "::notice::No test script — skipping."
          fi

  # ----------------------------------------------------------
  # Backend Build (Docker-based, Drogon from source)
  # ----------------------------------------------------------
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo
          file: ./tools/packagerepo/backend/Dockerfile
          push: false
          tags: nextra-packagerepo:ci
          load: true

      - name: Verify image runs
        run: |
          docker run --rm nextra-packagerepo:ci \
            packagerepo-server --help || true
          echo "Backend image built successfully."

  # ----------------------------------------------------------
  # Integration Test (backend + PostgreSQL)
  # ----------------------------------------------------------
  integration-test:
    name: Integration Test
    needs: build-backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: packagerepo
          POSTGRES_USER: packagerepo
          POSTGRES_PASSWORD: packagerepo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo
          file: ./tools/packagerepo/backend/Dockerfile
          push: false
          tags: nextra-packagerepo:ci
          load: true

      - name: Run migrations
        run: |
          for f in tools/packagerepo/backend/migrations/*.sql; do
            PGPASSWORD=packagerepo psql \
              -h localhost -U packagerepo \
              -d packagerepo -f "$f" -q 2>&1 \
              | grep -v "already exists" || true
          done

      - name: Start backend
        run: |
          docker run -d --name repo-ci \
            --network host \
            -e "DATABASE_URL=host=localhost port=5432 \
              dbname=packagerepo user=packagerepo \
              password=packagerepo" \
            -e PGHOST=localhost \
            -e PGPORT=5432 \
            -e PGUSER=packagerepo \
            -e PGPASSWORD=packagerepo \
            -e PGDATABASE=packagerepo \
            -e JWT_SECRET=ci-test-key \
            -e PORT=5050 \
            nextra-packagerepo:ci
          sleep 3

      - name: Health check
        run: |
          curl -sf http://localhost:5050/health \
            | grep -q healthy
          echo "Health check passed."

      - name: Test auth flow
        run: |
          TOKEN=$(curl -sf -X POST \
            http://localhost:5050/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin"}' \
            | python3 -c \
              "import sys,json; \
               print(json.load(sys.stdin)['token'])")
          echo "Login successful."

          curl -sf \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:5050/auth/me \
            | python3 -c \
              "import sys,json; \
               d=json.load(sys.stdin); \
               assert d['user']['username']=='admin'"
          echo "Auth verification passed."

      - name: Test publish and fetch
        run: |
          TOKEN=$(curl -sf -X POST \
            http://localhost:5050/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin"}' \
            | python3 -c \
              "import sys,json; \
               print(json.load(sys.stdin)['token'])")

          echo "ci-test-payload" | curl -sf -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            --data-binary @- \
            http://localhost:5050/v1/ci/test-pkg/0.1.0/default/blob \
            | python3 -c \
              "import sys,json; \
               d=json.load(sys.stdin); \
               assert d['ok']==True"
          echo "Publish passed."

          curl -sf \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:5050/v1/ci/test-pkg/latest \
            | python3 -c \
              "import sys,json; \
               d=json.load(sys.stdin); \
               assert d['version']=='0.1.0'"
          echo "Latest version check passed."

          curl -sf \
            http://localhost:5050/v1/packages \
            | python3 -c \
              "import sys,json; \
               d=json.load(sys.stdin); \
               assert len(d['packages'])>=1"
          echo "Package listing passed."

      - name: Cleanup
        if: always()
        run: docker rm -f repo-ci 2>/dev/null || true
