# ============================================================
# Docker Build — linux/arm64 (Package Repository)
# Native arm64 runner, no QEMU. Frontend and backend run
# in parallel. Pushes intermediate tags for docker-merge.
# ============================================================
name: Docker Build linux/arm64

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "tools/packagerepo/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-frontend:
    name: Build frontend linux/arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo/frontend
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/packagerepo-frontend:build-${{ github.sha }}-arm64
          cache-from: type=gha,scope=pkgrepo-fe-arm64
          cache-to: type=gha,mode=max,scope=pkgrepo-fe-arm64

  build-backend:
    name: Build backend linux/arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo
          file: ./tools/packagerepo/backend/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/packagerepo-backend:build-${{ github.sha }}-arm64
          cache-from: type=gha,scope=pkgrepo-be-arm64
          cache-to: type=gha,mode=max,scope=pkgrepo-be-arm64
