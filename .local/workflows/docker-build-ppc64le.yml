# ============================================================
# Docker Build — linux/ppc64le (Package Repository)
# Builds via QEMU. Node 22 compiles from source (slow
# first build, cached thereafter).
# ============================================================
name: Docker Build linux/ppc64le

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "tools/packagerepo/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-frontend:
    name: Build frontend linux/ppc64le
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo/frontend
          platforms: linux/ppc64le
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/packagerepo-frontend:build-${{ github.sha }}-ppc64le
          cache-from: type=gha,scope=pkgrepo-fe-ppc64le
          cache-to: type=gha,mode=max,scope=pkgrepo-fe-ppc64le

  build-backend:
    name: Build backend linux/ppc64le
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./tools/packagerepo
          file: ./tools/packagerepo/backend/Dockerfile
          platforms: linux/ppc64le
          push: ${{ github.event_name == 'push' }}
          tags: >-
            ghcr.io/${{ github.repository }}/packagerepo-backend:build-${{ github.sha }}-ppc64le
          cache-from: type=gha,scope=pkgrepo-be-ppc64le
          cache-to: type=gha,mode=max,scope=pkgrepo-be-ppc64le
