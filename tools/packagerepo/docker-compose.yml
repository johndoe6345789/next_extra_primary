services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: packagerepo
      POSTGRES_USER: packagerepo
      POSTGRES_PASSWORD: packagerepo
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  s3db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: s3server
      POSTGRES_USER: s3user
      POSTGRES_PASSWORD: s3pass
    volumes:
      - s3db-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  s3:
    build:
      context: ../s3server
      dockerfile: backend/Dockerfile
    environment:
      S3_DATA_DIR: /data/s3
      S3_DB_CONN: >-
        host=s3db port=5432
        dbname=s3server user=s3user password=s3pass
      S3_REGION: us-east-1
      S3_PORT: "9000"
      PGHOST: s3db
      PGPORT: "5432"
      PGUSER: s3user
      PGPASSWORD: s3pass
      PGDATABASE: s3server
    volumes:
      - s3-data:/data/s3
    depends_on:
      - s3db
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5050:5000"
    environment:
      S3_ENDPOINT: http://s3:9000
      S3_BUCKET: packagerepo
      S3_ACCESS_KEY: minioadmin
      JWT_SECRET: dev-secret-change-in-production
      DATABASE_URL: >-
        host=db port=5432
        dbname=packagerepo user=packagerepo
        password=packagerepo
      PGHOST: db
      PGPORT: "5432"
      PGUSER: packagerepo
      PGPASSWORD: packagerepo
      PGDATABASE: packagerepo
    depends_on:
      - db
      - s3
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  db-data:
    driver: local
  s3db-data:
    driver: local
  s3-data:
    driver: local

networks:
  app-network:
    driver: bridge
