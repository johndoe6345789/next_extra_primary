services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pgadmin
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: pgadmin
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - pgadmin-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5060:5060"
    environment:
      PG_CONN: >-
        host=db port=5432
        dbname=pgadmin user=pgadmin password=pgadmin
      PG_PORT: "5060"
      JWT_SECRET: dev-secret-change-in-production
      PGHOST: db
      PGPORT: "5432"
      PGUSER: pgadmin
      PGPASSWORD: pgadmin
      PGDATABASE: pgadmin
    depends_on:
      - db
    networks:
      - pgadmin-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      BACKEND_URL: http://backend:5060
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - pgadmin-network
    restart: unless-stopped

volumes:
  db-data:
    driver: local

networks:
  pgadmin-network:
    driver: bridge
