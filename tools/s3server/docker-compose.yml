services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: s3server
      POSTGRES_USER: s3user
      POSTGRES_PASSWORD: s3pass
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - s3-network
    restart: unless-stopped

  s3:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "9000:9000"
    environment:
      S3_DATA_DIR: /data/s3
      S3_DB_CONN: "host=db port=5432 dbname=s3server user=s3user password=s3pass"
      S3_REGION: us-east-1
      S3_PORT: "9000"
      PGHOST: db
      PGPORT: "5432"
      PGUSER: s3user
      PGPASSWORD: s3pass
      PGDATABASE: s3server
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    volumes:
      - s3-data:/data/s3
    depends_on:
      - db
      - elasticsearch
    networks:
      - s3-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      BACKEND_URL: http://s3:9000
    depends_on:
      - s3
    networks:
      - s3-network
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.17.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - esdata:/var/lib/elasticsearch/data
    networks:
      - s3-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
    driver: local
  s3-data:
    driver: local
  esdata:
    driver: local

networks:
  s3-network:
    driver: bridge
