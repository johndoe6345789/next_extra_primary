# Development override — use with:
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.dev.yml \
#                  up --build
#
# Rebuilds each Next.js UI from Dockerfile.dev so it runs
# next dev --turbopack with hot-reload. All other services
# (C++ backends, DBs, Kafka, etc.) are unchanged.
