  image_processor_frontend_next:
  pgadmin_frontend_node_modules:
  pgadmin_frontend_next:
  s3_frontend_node_modules:
  s3_frontend_next:
  packagerepo_frontend_node_modules:
  packagerepo_frontend_next:
  audit_node_modules:
  audit_next:
