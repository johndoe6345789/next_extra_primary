# ==============================================================
volumes:
  pgdata:
  esdata:
  redisdata:
  kafkadata:
  maildata:
  mailstate:
  maillogs:
  emailclient-dbdata:
  packagerepo-dbdata:
  s3-dbdata:
  s3-data:
  transcode-work:
