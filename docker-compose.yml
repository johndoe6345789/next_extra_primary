## Unified Docker Compose for the full Nextra stack.
##
## Usage:
##   docker compose up --build              # all services
##   docker compose up -d                   # detached mode
##
## Portal homepage:   http://localhost:8000   (nginx reverse proxy)
## Email client:       http://localhost:8025
## PgAdmin tool:       http://localhost:3002  (profile: tools)
## Package repo:       http://localhost:5051  (profile: tools)
## S3 server UI:       http://localhost:3001  (profile: tools)

# ==============================================================
#  Core services (always started)
# ==============================================================
services:

  # ---- PostgreSQL (main app) ---------------------------------
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nextra_db
      POSTGRES_USER: nextra
      POSTGRES_PASSWORD: nextra_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextra -d nextra_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Elasticsearch -----------------------------------------
  elasticsearch:
    image: elasticsearch:8.17.0
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - esdata:/var/lib/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis (cache + token buckets + pub/sub) --------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---- Kafka (KRaft single-node, no Zookeeper) ---------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: >-
        PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "nextra-kraft-cluster-0"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL",
        "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  # ---- Mail server (Postfix + Dovecot) -----------------------
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    hostname: mail
    domainname: nextra.local
    ports:
      - "25:25"
      - "587:587"
      - "143:143"
    environment:
      ENABLE_CLAMAV: 0
      ENABLE_SPAMASSASSIN: 0
      ENABLE_FAIL2BAN: 0
      ENABLE_POSTGREY: 0
      ENABLE_AMAVIS: 0
      SSL_TYPE: "self-signed"
      PERMIT_DOCKER: network
      ONE_DIR: 1
      OVERRIDE_HOSTNAME: mail.nextra.local
      POSTFIX_INET_PROTOCOLS: ipv4
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - maillogs:/var/log/mail
      - ./docker/mail/config/:/tmp/docker-mailserver/
    healthcheck:
      test: ["CMD-SHELL", "ss -lntp | grep ':25 ' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- Email client Postgres (metadata store) ----------------
  emailclient-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: emailclient
      POSTGRES_USER: emailclient
      POSTGRES_PASSWORD: emailclient
    volumes:
      - emailclient-dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailclient -d emailclient"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Email client API (Flask backend) ----------------------
  emailclient-api:
    build:
      context: ./tools/emailclient
      dockerfile: deployment/docker/email-service/Dockerfile
    ports:
      - "8500:5000"
    depends_on:
      mailserver:
        condition: service_healthy
      emailclient-db:
        condition: service_healthy
    environment:
      POSTFIX_HOST: mailserver
      POSTFIX_PORT: "25"
      DOVECOT_HOST: mailserver
      DOVECOT_IMAP_PORT: "143"
      SMTP_HOST: mailserver
      SMTP_PORT: "587"
      DATABASE_URL: >-
        postgresql://emailclient:emailclient@emailclient-db:5432/emailclient
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      IMAP_SYNC_INTERVAL: "300"
      SMTP_TIMEOUT: "30"
    restart: unless-stopped

  # ---- Email client frontend (Next.js) -----------------------
  emailclient:
    build:
      context: ./tools/emailclient
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /emailclient
    ports:
      - "8025:3000"
    depends_on:
      emailclient-api:
        condition: service_started
      mailserver:
        condition: service_healthy
    environment:
      BACKEND_URL: http://emailclient-api:5000
      NODE_ENV: production
    restart: unless-stopped

  # ---- C++ API backend ---------------------------------------
  backend:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mailserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: change-me-in-production
      SMTP_HOST: mailserver
      SMTP_PORT: "587"
      SMTP_USER: noreply@nextra.local
      SMTP_PASS: nextra_dev
      SMTP_FROM: noreply@nextra.local
      APP_BASE_URL: http://localhost:3000
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_VERSION: "0.1.0"
    restart: unless-stopped

  # ---- Job scheduler daemon (durable ad-hoc queue) -----------
  job-scheduler:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "job-scheduler",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: unless-stopped

  # ---- Video transcoder daemon (Phase 4.2) -------------------
  # NOTE: runtime image must provide /usr/bin/ffmpeg.  If the
  # base runtime (debian:sid-slim) is missing ffmpeg, add the
  # following apt stanza to backend/Dockerfile's runtime stage:
  #   RUN apt-get update && apt-get install -y --no-install-recommends \
  #       ffmpeg && rm -rf /var/lib/apt/lists/*
  video-transcoder:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "video-transcoder",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      job-scheduler:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      S3_ENDPOINT: http://s3server:3001
    volumes:
      - transcode-work:/tmp/nextra-transcode
    restart: unless-stopped

  # ---- Cron manager daemon (scheduled_jobs -> job_queue) -----
  cron-manager:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "cron-manager",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      job-scheduler:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: unless-stopped

  # ---- Notification router daemon (Phase 1.3) ----------------
  notification-router:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "notification-router",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EMAIL_API_URL: http://emailclient-api:5000
    restart: unless-stopped

  # ---- Notifications operator tool (Phase 1.3) ---------------
  notifications:
    build:
      context: ./tools/notifications
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /notifications
    depends_on:
      - notification-router
    environment:
      NEXT_PUBLIC_BASE_PATH: /notifications
      BACKEND_URL: http://backend:8080
    restart: unless-stopped

  # ---- Gotenberg sidecar (HTML -> PDF) -----------------------
  gotenberg:
    image: gotenberg/gotenberg:8
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--chromium-disable-javascript=false"
    restart: unless-stopped

  # ---- PDF generator daemon (Phase 6.2) ----------------------
  pdf-generator:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "pdf-generator",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      job-scheduler:
        condition: service_started
      gotenberg:
        condition: service_started
      s3:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      GOTENBERG_URL: http://gotenberg:3000
      S3_ENDPOINT: http://s3:9000
    restart: unless-stopped

  # ---- Jobs operator tool (T3 Next.js frontend) --------------
  jobs:
    build:
      context: ./tools/jobs
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /jobs
    depends_on:
      - job-scheduler
    environment:
      NEXT_PUBLIC_BASE_PATH: /jobs
      BACKEND_URL: http://backend:8080
    restart: unless-stopped

  # ---- Search indexer daemon (Phase 4.5) --------------------
  search-indexer:
  # ---- mediamtx sidecar (RTSP/WebRTC/HLS media server) -------
  # Note: internal webrtc port 8889 collides with the portal's
  # host binding — map it to host 8890 instead.
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "8890:8889"
      - "8888:8888"
      - "9997:9997"
    environment:
      MTX_HLSADDRESS: ":8888"
      MTX_WEBRTCADDRESS: ":8889"
      MTX_RTSPADDRESS: ":8554"
      MTX_API: "yes"
      MTX_APIADDRESS: ":9997"
      MTX_RUNONREADY:
        "curl -s -X POST
         http://backend:8080/api/streams/hook/publish
         -H 'Content-Type: application/json'
         -d '{\"path\":\"$$MTX_PATH\",\"action\":\"publish\"}'"
    restart: unless-stopped

  # ---- media-streaming daemon (control plane) ---------------
  media-streaming:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "search-indexer",
    command: ["./nextra-api", "media-streaming",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mediamtx:
        condition: service_started
      backend:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    restart: unless-stopped

  # ---- Search operator tool (Next.js frontend) --------------
  search:
    build:
      context: ./tools/search
      MEDIAMTX_URL: http://mediamtx:9997
    restart: unless-stopped

  # ---- Streams operator tool (Next.js frontend) -------------
  streams:
    build:
      context: ./tools/streams
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /search
    depends_on:
      - search-indexer
    environment:
      NEXT_PUBLIC_BASE_PATH: /search
        NEXT_BASE_PATH: /streams
    depends_on:
      - media-streaming
    environment:
      NEXT_PUBLIC_BASE_PATH: /streams
      BACKEND_URL: http://backend:8080
    restart: unless-stopped

  # ---- mediamtx sidecar (RTSP/WebRTC/HLS media server) -------
  # Note: internal webrtc port 8889 collides with the portal's
  # host binding — map it to host 8890 instead.
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "8890:8889"
      - "8888:8888"
      - "9997:9997"
    environment:
      MTX_HLSADDRESS: ":8888"
      MTX_WEBRTCADDRESS: ":8889"
      MTX_RTSPADDRESS: ":8554"
      MTX_API: "yes"
      MTX_APIADDRESS: ":9997"
    restart: unless-stopped

  # ---- media-streaming daemon (control plane) ---------------
  media-streaming:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "media-streaming",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      mediamtx:
        condition: service_started
      backend:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      MEDIAMTX_URL: http://mediamtx:9997
    restart: unless-stopped

  # ---- Streams operator tool (Next.js frontend) -------------
  streams:
    build:
      context: ./tools/streams
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /streams
    depends_on:
      - media-streaming
    environment:
      NEXT_PUBLIC_BASE_PATH: /streams
      BACKEND_URL: http://backend:8080
    restart: unless-stopped

  # ---- Cron operator tool (schedule CRUD + preview) ----------
  cron:
    build:
      context: ./tools/cron
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /cron
    depends_on:
      - cron-manager
    environment:
      NEXT_PUBLIC_BASE_PATH: /cron
      BACKEND_URL: http://backend:8080
    restart: unless-stopped

  # ---- Backup manager daemon (pg_dump + encrypt + upload) ---
  backup-manager:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "backup-manager",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      job-scheduler:
        condition: service_started
      s3:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      BACKUP_KMS_KEY: >-
        ${BACKUP_KMS_KEY:-changeme-32-bytes-of-entropy-pad}
    restart: unless-stopped

  # ---- Backups operator tool (Next.js frontend) -------------
  backups:
    build:
      context: ./tools/backups
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /backups
    depends_on:
      - backup-manager
    environment:
      NEXT_PUBLIC_BASE_PATH: /backups
      BACKEND_URL: http://backend:8080
    restart: unless-stopped

  # ---- Next.js frontend (dev mode) ----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      additional_contexts:
        shared: ./shared
    ports:
      - "3100:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BASE_PATH: /app
      INTERNAL_API_URL: http://backend:8080
      NEXT_BASE_PATH: /app
      BACKEND_URL: http://backend:8080
    restart: unless-stopped

  # ---- SSO portal (login gate for all tools) -----------------
  sso:
    build:
      context: ./tools/sso
      dockerfile: Dockerfile
    ports:
      - "3099:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_ORIGIN: http://localhost:8889
      NODE_ENV: production
    restart: unless-stopped

  # ---- Audit manager daemon (Kafka → PG hash chain) ----------
  audit-manager:
    build:
      context: ./backend
      additional_contexts:
        manager: ./tools/manager
        commands: ./.local/commands
      args:
        DEPS_IMAGE: debian:sid
        RUNTIME_IMAGE: debian:sid-slim
    command: ["./nextra-api", "audit-manager",
              "--config", "config/config.json"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nextra_db
      DB_USER: nextra
      DB_PASSWORD: nextra_dev
      KAFKA_BROKERS: kafka:9092
    restart: unless-stopped

  # ---- Audit operator tool (T2 Next.js frontend) -------------
  audit:
    build:
      context: ./tools/audit
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /audit
    depends_on:
      - audit-manager
    environment:
      NEXT_PUBLIC_BASE_PATH: /audit
      BACKEND_URL: http://backend:8080
    restart: unless-stopped

  # ---- Nginx reverse proxy / portal --------------------------
  portal:
    image: nginx:alpine
    ports:
      - "8889:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/portal:/usr/share/nginx/portal:ro
    depends_on:
      - frontend
      - backend
      - sso
      - alerts
      - jobs
      - cron
      - flags
      - forum
      - notifications
      - streams
      - audit
      - search
    restart: unless-stopped


  # ---- Feature flags operator tool ---------------------------
  flags:
    build:
      context: ./tools/flags
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /flags
    ports:
      - "9004:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BASE_PATH: /flags
      BACKEND_API_URL: http://backend:8080
      NODE_ENV: production
      - audit
      - search
      - backups
      - status
    restart: unless-stopped

  # ---- Public status page (NOT SSO gated) -------------------
  status:
    build:
      context: ./tools/status
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /status
    ports:
      - "9014:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BASE_PATH: /status
      BACKEND_URL: http://backend:8080
      NODE_ENV: production
    restart: unless-stopped

  # ---- Alerts centre -----------------------------------------
  alerts:
    build:
      context: ./tools/alerts
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /alerts
    ports:
      - "8999:3000"
    depends_on:
      emailclient-api:
        condition: service_started
    environment:
      EMAIL_API_URL: http://emailclient-api:5000
      NODE_ENV: production
    restart: unless-stopped

  # ---- Forum moderation tool ---------------------------------
  forum:
    build:
      context: ./tools/forum
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /forum
    ports:
      - "9005:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_URL: http://backend:8080
      NODE_ENV: production
    restart: unless-stopped

# ==============================================================
#  Tool services
# ==============================================================

  # ---- Package repo Postgres ---------------------------------
  packagerepo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: packagerepo
      POSTGRES_USER: packagerepo
      POSTGRES_PASSWORD: packagerepo
    volumes:
      - packagerepo-dbdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ---- S3 server Postgres ------------------------------------
  s3-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: s3server
      POSTGRES_USER: s3user
      POSTGRES_PASSWORD: s3pass
    volumes:
      - s3-dbdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ---- S3-compatible object store ----------------------------
  s3:
    build:
      context: ./tools/s3server
      dockerfile: backend/Dockerfile
    ports:
      - "9000:9000"
    environment:
      S3_DATA_DIR: /data/s3
      S3_DB_CONN: >-
        host=s3-db port=5432
        dbname=s3server user=s3user password=s3pass
      S3_REGION: us-east-1
      S3_PORT: "9000"
      PGHOST: s3-db
      PGPORT: "5432"
      PGUSER: s3user
      PGPASSWORD: s3pass
      PGDATABASE: s3server
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    volumes:
      - s3-data:/data/s3
    depends_on:
      - s3-db
      - elasticsearch
    restart: unless-stopped

  # ---- S3 server frontend ------------------------------------
  s3-frontend:
    build:
      context: ./tools/s3server/frontend
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /s3
    ports:
      - "3001:3001"
    environment:
      BACKEND_URL: http://s3:9000
    depends_on:
      - s3
    restart: unless-stopped

  # ---- Package repo backend ----------------------------------
  packagerepo-backend:
    build:
      context: ./tools/packagerepo
      dockerfile: backend/Dockerfile
    ports:
      - "5050:5000"
    environment:
      S3_ENDPOINT: http://s3:9000
      S3_BUCKET: packagerepo
      S3_ACCESS_KEY: minioadmin
      JWT_SECRET: dev-secret-change-in-production
      DATABASE_URL: >-
        host=packagerepo-db port=5432
        dbname=packagerepo user=packagerepo
        password=packagerepo
      PGHOST: packagerepo-db
      PGPORT: "5432"
      PGUSER: packagerepo
      PGPASSWORD: packagerepo
      PGDATABASE: packagerepo
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    depends_on:
      - packagerepo-db
      - s3
      - elasticsearch
    restart: unless-stopped

  # ---- Package repo frontend ---------------------------------
  packagerepo-frontend:
    build:
      context: ./tools/packagerepo/frontend
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /repo
    ports:
      - "5051:3000"
    environment:
      BACKEND_URL: http://packagerepo-backend:5000
      NODE_ENV: production
    depends_on:
      - packagerepo-backend
    restart: unless-stopped

  # ---- PgAdmin backend (connects to main app DB) -------------
  pgadmin-backend:
    build:
      context: ./tools/pgadmin
      dockerfile: backend/Dockerfile
    ports:
      - "5060:5060"
    environment:
      PG_CONN: >-
        host=db port=5432
        dbname=nextra_db user=nextra password=nextra_dev
      PG_PORT: "5060"
      JWT_SECRET: dev-secret-change-in-production
      PGHOST: db
      PGPORT: "5432"
      PGUSER: nextra
      PGPASSWORD: nextra_dev
      PGDATABASE: nextra_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---- PgAdmin frontend -------------------------------------
  pgadmin-frontend:
    build:
      context: ./tools/pgadmin/frontend
      dockerfile: Dockerfile
      additional_contexts:
        shared: ./shared
      args:
        NEXT_BASE_PATH: /db
    ports:
      - "3002:3002"
    environment:
      BACKEND_URL: http://pgadmin-backend:5060
      NODE_ENV: production
    depends_on:
      - pgadmin-backend
    restart: unless-stopped

